name: Apply generated attack path patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-generated-attack-path-patch.yml

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, 'Apply generated attack path patch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply exact local patch
        shell: bash
        run: |
          cat > /tmp/patch.b64 <<'PATCH'

PATCH
          base64 -d /tmp/patch.b64 | gzip -d > /tmp/attack-path.patch
          git apply --binary /tmp/attack-path.patch
          rm -f .github/workflows/apply-generated-attack-path-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Apply generated attack path patch"
          git push
