name: Unpack uploaded source

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Unpack source archive
        run: |
          set -euo pipefail
          test -f remediation-simulation-platform-source.zip
          unzip -o remediation-simulation-platform-source.zip
          rm remediation-simulation-platform-source.zip
          rm .github/workflows/unpack-source.yml
      - name: Commit extracted source
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Extract remediation simulation platform source"
          git push origin main
