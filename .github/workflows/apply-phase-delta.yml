name: Apply Phase 0-4 Delta

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'stage phase 0-4 delta')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply source delta
        run: |
          set -euo pipefail
          tar -xJf remediation-phase-0-4-delta.tar.xz
          rm -f remediation-phase-0-4-delta.tar.xz .github/workflows/apply-phase-delta.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/API.md prisma/schema.prisma src/app src/components src/domain
          git add -u remediation-phase-0-4-delta.tar.xz .github/workflows/apply-phase-delta.yml
          git commit -m "Build phase 0-4 remediation platform" || exit 0
          git push
