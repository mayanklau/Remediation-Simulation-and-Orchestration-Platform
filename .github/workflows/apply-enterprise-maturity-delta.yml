name: Apply enterprise maturity delta

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-delta:
    if: contains(github.event.head_commit.message, 'stage enterprise maturity delta')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract maturity source delta
        run: |
          tar -xJf remediation-maturity-delta.tar.xz
          rm remediation-maturity-delta.tar.xz
          rm .github/workflows/apply-enterprise-maturity-delta.yml
      - name: Commit extracted source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md src/app src/domain
          git add -u .github remediation-maturity-delta.tar.xz
          git commit -m "Build enterprise maturity features" || exit 0
          git push
