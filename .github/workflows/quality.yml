name: quality

on:
  push:
  pull_request:

jobs:
  next-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: DATABASE_URL="file:./ci.db" npm run db:push
      - run: DATABASE_URL="file:./ci.db" npm run build
      - run: npm audit --audit-level=high
