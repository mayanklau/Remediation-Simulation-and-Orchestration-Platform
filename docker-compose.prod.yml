services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: remediation_twin
      POSTGRES_USER: remediation
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remediation -d remediation_twin"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      DATABASE_URL: "postgresql://remediation:change-me@postgres:5432/remediation_twin?schema=public"
      APP_URL: "http://localhost:3000"
      DEFAULT_TENANT_SLUG: "default"
      SESSION_SECRET: "replace-with-32-byte-random-secret"
      SECRET_PROVIDER: "external"
      WORKER_CONCURRENCY: "4"
      EVIDENCE_STORAGE_URL: "s3://replace-with-evidence-bucket"
    ports:
      - "3000:3000"

volumes:
  postgres-data:
