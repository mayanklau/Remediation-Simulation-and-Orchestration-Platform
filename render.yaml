services:
  - type: web
    name: remediation-simulation-platform
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: remediation-simulation-platform-db
          property: connectionString
      - key: DEFAULT_TENANT_SLUG
        value: default
      - key: SESSION_SECRET
        generateValue: true
      - key: SECRET_PROVIDER
        value: render-env
      - key: WORKER_CONCURRENCY
        value: "4"
      - key: EVIDENCE_STORAGE_URL
        sync: false
      - key: OIDC_ISSUER
        sync: false
      - key: OIDC_CLIENT_ID
        sync: false
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"

databases:
  - name: remediation-simulation-platform-db
    plan: starter

